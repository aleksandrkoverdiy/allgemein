<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Кроссвордов PRO</title>
    <style>
        :root { --cell: 35px; --accent: #3498db; --error: #e74c3c; --success: #2ecc71; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .controls { 
            background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 20px; width: 100%; max-width: 550px; text-align: center; 
        }

        .input-group { margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; }
        input { padding: 10px; border: 2px solid #ddd; border-radius: 6px; width: 180px; text-transform: uppercase; font-weight: bold; }
        
        .btn { padding: 10px 15px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-main { background: var(--accent); color: white; }
        .btn-undo { background: #95a5a6; color: white; }
        .btn-clear { background: #ecf0f1; color: #333; }
        .btn:hover { opacity: 0.8; }

        .grid { display: grid; grid-template-columns: repeat(15, var(--cell)); grid-template-rows: repeat(15, var(--cell)); gap: 1px; background: #333; border: 3px solid #333; border-radius: 4px; }
        .cell { width: var(--cell); height: var(--cell); background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; }
        .cell.empty { background: #2c3e50; }
        .cell.target { background: #fff9c4; cursor: pointer; position: relative; }
        .cell.target::after { content: ''; position: absolute; inset: 0; border: 2px dashed #f1c40f; }

        .status { margin-top: 10px; font-size: 14px; min-height: 20px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Конструктор Кроссвордов</h2>
        <div class="input-group">
            <input type="text" id="wordInput" placeholder="Введите слово..." maxlength="12">
            <button class="btn btn-main" onclick="processInput()">Добавить</button>
        </div>
        <div class="input-group">
            <button class="btn btn-undo" onclick="undoLast()">Отменить последнее</button>
            <button class="btn btn-clear" onclick="clearAll()">Очистить всё</button>
        </div>
        <div class="status" id="status"></div>
    </div>

    <div class="grid" id="grid"></div>

    <script>
        const SIZE = 15;
        let grid = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
        let history = []; // Для хранения состояний сетки

        function render() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${grid[r][c] ? '' : 'empty'}`;
                    cell.textContent = grid[r][c] || '';
                    cell.dataset.r = r; cell.dataset.c = c;
                    container.appendChild(cell);
                }
            }
        }

        function processInput() {
            const word = document.getElementById('wordInput').value.toUpperCase().trim();
            if (word.length < 2) return;

            if (history.length === 0) {
                place(word, 7, Math.floor((SIZE - word.length) / 2), 'h');
                showStatus("Первое слово добавлено!", "success");
            } else {
                findPossibleConnections(word);
            }
            document.getElementById('wordInput').value = '';
        }

        function findPossibleConnections(word) {
            render();
            let found = false;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c]) {
                        const charIdx = word.indexOf(grid[r][c]);
                        if (charIdx !== -1) {
                            const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
                            cell.classList.add('target');
                            cell.onclick = () => tryPlace(word, r, c, charIdx);
                            found = true;
                        }
                    }
                }
            }
            showStatus(found ? "Нажмите на желтую букву для пересечения" : "Нет общих букв!", found ? "" : "error");
        }

        function tryPlace(word, r, c, wordIdx) {
            // Определяем направление на основе существующих слов
            // Если в этой клетке уже есть буква, смотрим, горизонтальная она или вертикальная
            const isVerticalSite = (r > 0 && grid[r-1][c]) || (r < SIZE-1 && grid[r+1][c]);
            const dir = isVerticalSite ? 'h' : 'v';
            
            const startR = dir === 'v' ? r - wordIdx : r;
            const startC = dir === 'h' ? c - wordIdx : c;

            if (isValidPlacement(word, startR, startC, dir)) {
                saveState();
                place(word, startR, startC, dir);
                showStatus("Слово успешно добавлено!", "success");
            } else {
                showStatus("Ошибка: Слово слипается с другими словами!", "error");
            }
        }

        function isValidPlacement(word, startR, startC, dir) {
            // Проверка границ
            if (startR < 0 || startC < 0 || 
                (dir === 'v' && startR + word.length > SIZE) || 
                (dir === 'h' && startC + word.length > SIZE)) return false;

            for (let i = 0; i < word.length; i++) {
                const currR = dir === 'v' ? startR + i : startR;
                const currC = dir === 'h' ? startC + i : startC;

                // 1. Если в клетке уже есть буква, она должна совпадать
                if (grid[currR][currC] && grid[currR][currC] !== word[i]) return false;

                // 2. Проверка боковых соседей (важно!)
                const neighbors = (dir === 'v') 
                    ? [{dr: 0, dc: -1}, {dr: 0, dc: 1}] // Для вертикального слова проверяем лево/право
                    : [{dr: -1, dc: 0}, {dr: 1, dc: 0}]; // Для горизонтального - верх/низ

                for (const n of neighbors) {
                    const nr = currR + n.dr, nc = currC + n.dc;
                    if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                        // Если сосед занят, а наша текущая клетка БЫЛА пустой — это незаконное касание боком
                        if (grid[nr][nc] && !grid[currR][currC]) return false;
                    }
                }

                // 3. Проверка торцов (перед первой и после последней буквы)
                if (i === 0) { // Перед началом
                    const br = dir === 'v' ? currR - 1 : currR;
                    const bc = dir === 'h' ? currC - 1 : currC;
                    if (br >= 0 && br < SIZE && bc >= 0 && bc < SIZE && grid[br][bc]) return false;
                }
                if (i === word.length - 1) { // После конца
                    const ar = dir === 'v' ? currR + 1 : currR;
                    const ac = dir === 'h' ? currC + 1 : currC;
                    if (ar >= 0 && ar < SIZE && ac >= 0 && ac < SIZE && grid[ar][ac]) return false;
                }
            }
            return true;
        }

        function place(word, r, c, dir) {
            for (let i = 0; i < word.length; i++) {
                grid[dir === 'v' ? r + i : r][dir === 'h' ? c + i : c] = word[i];
            }
            render();
        }

        function saveState() {
            history.push(JSON.stringify(grid));
        }

        function undoLast() {
            if (history.length > 0) {
                grid = JSON.parse(history.pop());
                render();
                showStatus("Последнее действие отменено", "");
            }
        }

        function clearAll() {
            if (confirm("Очистить весь кроссворд?")) {
                grid = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
                history = [];
                render();
                showStatus("Поле очищено", "");
            }
        }

        function showStatus(msg, type) {
            const s = document.getElementById('status');
            s.innerText = msg;
            s.style.color = type === "error" ? "var(--error)" : (type === "success" ? "var(--success)" : "#555");
        }

        render();
    </script>
</body>
</html>

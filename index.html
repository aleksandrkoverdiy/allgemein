<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Кроссвордов (Исправленный)</title>
    <style>
        :root { --cell: 35px; --accent: #3498db; }
        body { font-family: system-ui, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; width: 100%; max-width: 500px; text-align: center; }
        input { padding: 10px; border: 2px solid #ddd; border-radius: 6px; width: 150px; text-transform: uppercase; }
        button { padding: 10px 15px; cursor: pointer; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(15, var(--cell)); grid-template-rows: repeat(15, var(--cell)); gap: 1px; background: #444; border: 2px solid #444; }
        .cell { width: var(--cell); height: var(--cell); background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; }
        .cell.empty { background: #2c3e50; }
        .cell.target { background: #fff9c4; cursor: pointer; border: 2px inset #fbc02d; box-sizing: border-box; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .status { margin-top: 10px; font-size: 14px; color: #e74c3c; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

    <div class="controls">
        <h3>Умный Конструктор</h3>
        <input type="text" id="wordInput" placeholder="Слово..." maxlength="12">
        <button onclick="processInput()">Добавить</button>
        <div class="status" id="status"></div>
    </div>

    <div class="grid" id="grid"></div>

    <script>
        const SIZE = 15;
        let grid = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
        let placedWords = [];

        function render() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${grid[r][c] ? '' : 'empty'}`;
                    cell.textContent = grid[r][c] || '';
                    cell.dataset.r = r; cell.dataset.c = c;
                    container.appendChild(cell);
                }
            }
        }

        function processInput() {
            const word = document.getElementById('wordInput').value.toUpperCase().trim();
            if (word.length < 2) return;

            if (placedWords.length === 0) {
                place(word, 7, Math.floor((SIZE - word.length) / 2), 'h');
                setStatus("", false);
            } else {
                findConnections(word);
            }
            document.getElementById('wordInput').value = '';
        }

        function findConnections(word) {
            render();
            let found = false;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c]) {
                        const idx = word.indexOf(grid[r][c]);
                        if (idx !== -1) {
                            const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
                            cell.classList.add('target');
                            cell.onclick = () => tryPlace(word, r, c, idx);
                            found = true;
                        }
                    }
                }
            }
            setStatus(found ? "Нажми на желтую букву для стыковки" : "Нет общих букв!", !found);
        }

        function tryPlace(word, r, c, idx) {
            // Определяем направление: если буква уже часть горизонтального, новое будет вертикальным
            const isH = placedWords.some(w => w.r === r && c >= w.c && c < w.c + w.word.length && w.dir === 'h');
            const dir = isH ? 'v' : 'h';
            
            const startR = dir === 'v' ? r - idx : r;
            const startC = dir === 'h' ? c - idx : c;

            if (isValid(word, startR, startC, dir)) {
                place(word, startR, startC, dir);
                setStatus("Слово добавлено!", false);
            } else {
                setStatus("Ошибка: Слишком тесно! Слова не должны слипаться.", true);
            }
        }

        function isValid(word, startR, startC, dir) {
            if (startR < 0 || startC < 0 || 
                (dir === 'v' && startR + word.length > SIZE) || 
                (dir === 'h' && startC + word.length > SIZE)) return false;

            for (let i = 0; i < word.length; i++) {
                const r = dir === 'v' ? startR + i : startR;
                const c = dir === 'h' ? startC + i : startC;

                // 1. Проверка конфликта букв
                if (grid[r][c] && grid[r][c] !== word[i]) return false;

                // 2. Проверка соседей
                const neighbors = [
                    {dr: -1, dc: 0}, {dr: 1, dc: 0}, 
                    {dr: 0, dc: -1}, {dr: 0, dc: 1}
                ];

                for (let n of neighbors) {
                    const nr = r + n.dr;
                    const nc = c + n.dc;
                    
                    if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                        const neighborContent = grid[nr][nc];
                        if (neighborContent) {
                            // Клетка занята. Проверяем, является ли это допустимым пересечением:
                            const isCurrentCell = (nr === r && nc === c);
                            
                            // Проверяем, не является ли этот сосед частью нашего же нового слова
                            let isPartOfNewWord = false;
                            if (dir === 'h' && nr === startR && nc >= startC && nc < startC + word.length) isPartOfNewWord = true;
                            if (dir === 'v' && nc === startC && nr >= startR && nr < startR + word.length) isPartOfNewWord = true;

                            // Если это не сама буква пересечения и не часть нашего слова - это недопустимое "слипание"
                            if (!isCurrentCell && !isPartOfNewWord) {
                                return false; 
                            }
                        }
                    }
                }
            }
            return true;
        }

        function place(word, r, c, dir) {
            for (let i = 0; i < word.length; i++) {
                grid[dir === 'v' ? r + i : r][dir === 'h' ? c + i : c] = word[i];
            }
            placedWords.push({word, r, c, dir});
            render();
        }

        function setStatus(msg, isError) {
            const el = document.getElementById('status');
            el.innerText = msg;
            el.style.color = isError ? "#e74c3c" : "#2ecc71";
        }

        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Кроссвордов + Экспорт</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --cell: 35px; --accent: #3498db; }
        body { font-family: system-ui, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .controls { 
            background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 20px; width: 100%; max-width: 550px; text-align: center; 
        }

        .input-group { margin: 10px 0; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        input { padding: 10px; border: 2px solid #ddd; border-radius: 6px; width: 180px; text-transform: uppercase; font-weight: bold; }
        
        .btn { padding: 10px 15px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-main { background: var(--accent); color: white; }
        .btn-secondary { background: #2ecc71; color: white; }
        .btn-undo { background: #95a5a6; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Контейнер, который будем превращать в картинку */
        #capture-area { background: #333; padding: 10px; border-radius: 4px; }
        
        .grid { display: grid; grid-template-columns: repeat(15, var(--cell)); grid-template-rows: repeat(15, var(--cell)); gap: 1px; background: #333; }
        .cell { width: var(--cell); height: var(--cell); background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; }
        .cell.empty { background: #2c3e50; }
        .cell.target { background: #fff9c4; cursor: pointer; outline: 2px dashed #f1c40f; outline-offset: -3px; z-index: 10; }

        .status { margin-top: 10px; font-size: 14px; min-height: 20px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Генератор Кроссвордов</h2>
        <div class="input-group">
            <input type="text" id="wordInput" placeholder="Слово..." maxlength="12">
            <button class="btn btn-main" onclick="processInput()">Добавить</button>
        </div>
        <div class="input-group">
            <button class="btn btn-undo" onclick="undoLast()">Отменить</button>
            <button class="btn btn-secondary" onclick="exportImage()">Скачать PNG</button>
        </div>
        <div class="status" id="status">Введите первое слово</div>
    </div>

    <div id="capture-area">
        <div class="grid" id="grid"></div>
    </div>

    <script>
        const SIZE = 15;
        let grid = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
        let history = []; 

        function render() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${grid[r][c] ? '' : 'empty'}`;
                    cell.textContent = grid[r][c] || '';
                    cell.dataset.r = r; cell.dataset.c = c;
                    container.appendChild(cell);
                }
            }
        }

        function processInput() {
            const word = document.getElementById('wordInput').value.toUpperCase().trim();
            if (word.length < 2) return;

            if (history.length === 0) {
                saveState();
                place(word, 7, Math.floor((SIZE - word.length) / 2), 'h');
                showStatus("Первое слово готово!", "#2ecc71");
            } else {
                findConnections(word);
            }
            document.getElementById('wordInput').value = '';
        }

        function findConnections(word) {
            render();
            let found = false;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c]) {
                        const idx = word.indexOf(grid[r][c]);
                        if (idx !== -1) {
                            const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
                            cell.classList.add('target');
                            // Передаем точные координаты и индекс буквы в новом слове
                            cell.onclick = (e) => {
                                e.stopPropagation();
                                tryPlace(word, r, c, idx);
                            };
                            found = true;
                        }
                    }
                }
            }
            showStatus(found ? "Кликни по желтой клетке" : "Нет общих букв", found ? "#3498db" : "#e74c3c");
        }

        function tryPlace(word, r, c, idx) {
            // ОПРЕДЕЛЯЕМ НАПРАВЛЕНИЕ:
            // Если над или под буквой есть соседи — значит слово вертикальное, ставим новое горизонтально.
            const hasVerticalNeighbors = (r > 0 && grid[r-1][c]) || (r < SIZE-1 && grid[r+1][c]);
            const dir = hasVerticalNeighbors ? 'h' : 'v';
            
            const startR = dir === 'v' ? r - idx : r;
            const startC = dir === 'h' ? c - idx : c;

            if (isValid(word, startR, startC, dir)) {
                saveState();
                place(word, startR, startC, dir);
                showStatus("Добавлено!", "#2ecc71");
                render(); // Сбрасываем желтую подсветку
            } else {
                showStatus("Ошибка: Слипается с соседями!", "#e74c3c");
            }
        }

        function isValid(word, startR, startC, dir) {
            if (startR < 0 || startC < 0 || (dir === 'v' && startR + word.length > SIZE) || (dir === 'h' && startC + word.length > SIZE)) return false;

            for (let i = 0; i < word.length; i++) {
                const r = dir === 'v' ? startR + i : startR;
                const c = dir === 'h' ? startC + i : startC;

                // Если клетка уже занята другой буквой
                if (grid[r][c] && grid[r][c] !== word[i]) return false;

                // Проверка боков и торцов
                const neighbors = (dir === 'v') ? [{dr:0, dc:-1}, {dr:0, dc:1}] : [{dr:-1, dc:0}, {dr:1, dc:0}];
                for (let n of neighbors) {
                    let nr = r + n.dr, nc = c + n.dc;
                    if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                        if (grid[nr][nc] && !grid[r][c]) return false; // Касание боком пустой клетки
                    }
                }
                // Торцы
                if (i === 0) {
                    let tr = dir === 'v' ? r-1 : r, tc = dir === 'h' ? c-1 : c;
                    if (tr >= 0 && tr < SIZE && tc >= 0 && tc < SIZE && grid[tr][tc]) return false;
                }
                if (i === word.length-1) {
                    let ar = dir === 'v' ? r+1 : r, ac = dir === 'h' ? c+1 : c;
                    if (ar >= 0 && ar < SIZE && ac >= 0 && ac < SIZE && grid[ar][ac]) return false;
                }
            }
            return true;
        }

        function place(word, r, c, dir) {
            for (let i = 0; i < word.length; i++) {
                grid[dir === 'v' ? r + i : r][dir === 'h' ? c + i : c] = word[i];
            }
            render();
        }

        function saveState() { history.push(JSON.stringify(grid)); }

        function undoLast() {
            if (history.length > 0) {
                grid = JSON.parse(history.pop());
                render();
                showStatus("Отменено", "#555");
            }
        }

        function showStatus(msg, color) {
            const s = document.getElementById('status');
            s.innerText = msg; s.style.color = color;
        }

        function exportImage() {
            const area = document.getElementById('capture-area');
            html2canvas(area).then(canvas => {
                const link = document.createElement('a');
                link.download = 'my-crossword.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бесконечный Конструктор Кроссвордов</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --cell: 40px; --accent: #3498db; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        
        .controls { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 30px; width: 100%; max-width: 600px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        
        input { padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); }
        #wordInput { text-transform: uppercase; width: 120px; font-weight: bold; }
        #clueInput { width: 250px; }

        .btn { padding: 12px 20px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; color: white; }
        .btn-add { background: var(--accent); }
        .btn-undo { background: #95a5a6; }
        .btn-save { background: #2ecc71; }

        #capture-area { padding: 40px; background: #f8f9fa; display: inline-block; }
        .grid { display: grid; gap: 1px; background: #444; border: 2px solid #444; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        
        .cell { width: var(--cell); height: var(--cell); background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; font-size: 18px; }
        .cell.empty { background: #2c3e50; }
        .cell.target { background: #fff9c4; cursor: pointer; z-index: 5; }
        .cell.target::after { content: ''; position: absolute; inset: 0; border: 3px dashed #f1c40f; }

        .clues-container { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; max-width: 800px; background: white; padding: 20px; border-radius: 12px; }
        .clues-column h3 { border-bottom: 2px solid var(--accent); padding-bottom: 5px; }
        .clue-item { margin: 8px 0; font-size: 15px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="input-group">
            <input type="text" id="wordInput" placeholder="СЛОВО" maxlength="15">
            <input type="text" id="clueInput" placeholder="Вопрос к слову...">
            <button class="btn btn-add" onclick="processInput()">Добавить</button>
        </div>
        <div class="input-group">
            <button class="btn btn-undo" onclick="undo()">Отменить</button>
            <button class="btn btn-save" onclick="save()">Скачать PNG</button>
        </div>
        <div id="status" style="font-size: 13px; color: #666;"></div>
    </div>

    <div id="capture-area">
        <div class="grid" id="grid"></div>
    </div>

    <div class="clues-container" id="cluesList">
        <div class="clues-column">
            <h3>По горизонтали</h3>
            <div id="h-clues"></div>
        </div>
        <div class="clues-column">
            <h3>По вертикали</h3>
            <div id="v-clues"></div>
        </div>
    </div>

    <script>
        let gridData = {}; // { "x,y": "A" }
        let wordsMetadata = []; // { word, x, y, dir, clue }
        let history = [];

        function render() {
            const gridEl = document.getElementById('grid');
            const keys = Object.keys(gridData);
            
            if (keys.length === 0) {
                gridEl.style.display = 'none';
                return;
            }
            gridEl.style.display = 'grid';

            // Находим границы
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            keys.forEach(key => {
                const [x, y] = key.split(',').map(Number);
                minX = Math.min(minX, x); maxX = Math.max(maxX, x);
                minY = Math.min(minY, y); maxY = Math.max(maxY, y);
            });

            // Добавляем небольшой запас по краям (padding)
            minX -= 1; maxX += 1; minY -= 1; maxY += 1;

            const cols = maxX - minX + 1;
            const rows = maxY - minY + 1;

            gridEl.style.gridTemplateColumns = `repeat(${cols}, var(--cell))`;
            gridEl.innerHTML = '';

            for (let y = minY; y <= maxY; y++) {
                for (let x = minX; x <= maxX; x++) {
                    const char = gridData[`${x},${y}`];
                    const cell = document.createElement('div');
                    cell.className = `cell ${char ? '' : 'empty'}`;
                    cell.textContent = char || '';
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    gridEl.appendChild(cell);
                }
            }
            updateClues();
        }

        function processInput() {
            const word = document.getElementById('wordInput').value.toUpperCase().trim();
            const clue = document.getElementById('clueInput').value.trim();
            if (word.length < 2) return;

            if (Object.keys(gridData).length === 0) {
                placeWord(word, 0, 0, 'h', clue);
                document.getElementById('status').innerText = "Первое слово добавлено!";
            } else {
                showTargets(word, clue);
            }
            document.getElementById('wordInput').value = '';
            document.getElementById('clueInput').value = '';
        }

        function showTargets(word, clue) {
            render();
            let found = false;
            Object.keys(gridData).forEach(key => {
                const char = gridData[key];
                const charIdx = word.indexOf(char);
                if (charIdx !== -1) {
                    const [x, y] = key.split(',').map(Number);
                    const cell = document.querySelector(`[data-x="${x}"][data-y="${y}"]`);
                    cell.classList.add('target');
                    cell.onclick = () => {
                        // Определяем направление: инвертируем то, что уже есть в этой клетке
                        const isExistingH = wordsMetadata.some(w => w.y === y && x >= w.x && x < w.x + w.word.length && w.dir === 'h');
                        const dir = isExistingH ? 'v' : 'h';
                        const startX = dir === 'h' ? x - charIdx : x;
                        const startY = dir === 'v' ? y - charIdx : y;

                        if (validate(word, startX, startY, dir)) {
                            placeWord(word, startX, startY, dir, clue);
                        } else {
                            alert("Здесь слово поставить нельзя (слипание или конфликт)");
                        }
                    };
                    found = true;
                }
            });
            if (!found) document.getElementById('status').innerText = "Нет пересечений для этого слова.";
        }

        function validate(word, startX, startY, dir) {
            for (let i = 0; i < word.length; i++) {
                const x = dir === 'h' ? startX + i : startX;
                const y = dir === 'v' ? startY + i : startY;

                // Конфликт букв
                if (gridData[`${x},${y}`] && gridData[`${x},${y}`] !== word[i]) return false;

                // Проверка соседей (чтобы не слипались параллельно)
                const neighbors = dir === 'h' ? [[0, 1], [0, -1]] : [[1, 0], [-1, 0]];
                for (let [dx, dy] of neighbors) {
                    if (gridData[`${x+dx},${y+dy}`] && !gridData[`${x},${y}`]) return false;
                }
                
                // Проверка торцов
                if (i === 0) {
                    const tx = dir === 'h' ? x-1 : x, ty = dir === 'v' ? y-1 : y;
                    if (gridData[`${tx},${ty}`]) return false;
                }
                if (i === word.length - 1) {
                    const ax = dir === 'h' ? x+1 : x, ay = dir === 'v' ? y+1 : y;
                    if (gridData[`${ax},${ay}`]) return false;
                }
            }
            return true;
        }

        function placeWord(word, x, y, dir, clue) {
            history.push({ grid: {...gridData}, meta: [...wordsMetadata] });
            for (let i = 0; i < word.length; i++) {
                const cx = dir === 'h' ? x + i : x;
                const cy = dir === 'v' ? y + i : y;
                gridData[`${cx},${cy}`] = word[i];
            }
            wordsMetadata.push({ word, x, y, dir, clue: clue || "Без описания" });
            render();
        }

        function undo() {
            if (history.length > 0) {
                const last = history.pop();
                gridData = last.grid;
                wordsMetadata = last.meta;
                render();
            }
        }

        function updateClues() {
            const hList = document.getElementById('h-clues');
            const vList = document.getElementById('v-clues');
            hList.innerHTML = ''; vList.innerHTML = '';

            wordsMetadata.forEach((w, i) => {
                const item = document.createElement('div');
                item.className = 'clue-item';
                item.innerHTML = `<strong>${i + 1}.</strong> ${w.clue} <em>(${w.word.length} б.)</em>`;
                if (w.dir === 'h') hList.appendChild(item); else vList.appendChild(item);
            });
        }

        function save() {
            const area = document.getElementById('capture-area');
            html2canvas(area).then(canvas => {
                const link = document.createElement('a');
                link.download = 'crossword.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        render();
    </script>
</body>
</html>
